syntax = "proto3";

option go_package = "github.com/swastiijain24/contracts/pb";

package pb;

message BankRequest {
    string transaction_id = 1;
    string payer_account_id = 2;   
    string payee_account_id = 3;    
    int64 amount = 4;
    string type = 5;
    string bank_code = 6;           
} 

message BankResponse {
    string transaction_id = 1;      
    string bank_reference_id = 2;   
    bool success = 3;               
    string error_message = 4;       
    string type = 5; 
}