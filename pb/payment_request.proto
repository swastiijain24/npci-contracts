syntax = "proto3";

option go_package = "github.com/swastiijain24/npci-contracts/pb"; 

package pb;

message PaymentRequest {
    string transaction_id = 1;
    string payer_account_id = 2;
    string payee_account_id = 3;
    int64 amount = 4;
    string payer_bank_code = 5;
    string payee_bank_code = 6;
    string mpin = 7;
}
