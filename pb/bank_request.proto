syntax = "proto3";

option go_package = "github.com/swastiijain24/contracts/pb";

package pb;

message BankRequest {
    string transaction_id = 1;
    string payer_account_id = 2;   
    string payee_account_id = 3;    
    int64 amount = 4;
    string bank_code = 5; 

    oneof operation {
        DebitDetails debit = 6;
        CreditDetails credit = 7;
        RefundDetails refund = 8;
    }           
} 

message DebitDetails{
    string mpin = 1;
}

message CreditDetails{}

message RefundDetails{}