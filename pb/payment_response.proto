syntax = "proto3";

option go_package = "github.com/swastiijain24/contracts/pb";

package pb;

message PaymentResponse {
    string transaction_id = 1;
    string status = 2;          
    string debit_bank_ref = 3; 
    string credit_bank_ref = 5;      
    string failure_reason = 5;
    string completed_at = 6;
}