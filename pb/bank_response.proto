syntax = "proto3";

option go_package = "github.com/swastiijain24/npci-contracts/pb"; 

package pb;

enum TransactionType {
    TXN_TYPE_UNKNOWN = 0;
    TXN_TYPE_DEBIT = 1;  
    TXN_TYPE_CREDIT = 2; 
}

message BankResponse {
    string transaction_id = 1;      // Matches the Request ID
    string bank_reference_id = 2;   // The Bank's internal trace(transaction) ID
    bool success = 3;               // True if funds moved
    string error_message = 4;       // "Insufficient funds", "Timeout", etc.
    TransactionType type = 5; 
}